description = "Drop the always-on hui activation rule into the current repo for every IDE agent"
prompt = "Write the per-repo hui rule files into the current repo and report the result. If `src/tools/hui-init.js` exists in the current repo (a hui checkout), run `node src/tools/hui-init.js {{args}}`. Otherwise run the standalone script (self-contained, supports stdin execution): `curl -fsSL https://raw.githubusercontent.com/2454760302hui/next-token/main/src/tools/hui-init.js | node - {{args}}`. Use --dry-run first if the user did not pass --force, so we never silently overwrite an existing rule file."
